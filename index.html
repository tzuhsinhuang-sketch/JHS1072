<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企劃書列表</title>
  <style>
    :root {
      --bg: #ffffff; --surface: #f6f8fa; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #0969da;
      --accent-dim: rgba(9,105,218,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 64px 24px;
    }
    .header { text-align: center; margin-bottom: 48px; }
    .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .header p { color: var(--muted); font-size: 15px; }
    .list { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 12px; }
    .card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border: 1px solid var(--border); border-radius: 10px;
      text-decoration: none; color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .card-left { display: flex; flex-direction: column; gap: 4px; }
    .card-code { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .04em; }
    .card-title { font-size: 16px; font-weight: 600; }
    .card-meta { font-size: 13px; color: var(--muted); }
    .card-arrow { color: var(--muted); font-size: 18px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>企劃書列表</h1>
    <p>JoyPeak Slot Spec</p>
  </div>
  <div class="list">
    <a class="card" href="JHS1072.html">
      <div class="card-left">
        <span class="card-code">JHS1072</span>
        <span class="card-title">海底龍宮</span>
        <span class="card-meta">v0.1　｜　2026-05-11</span>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>
</body>
</html>
